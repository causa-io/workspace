# yaml-language-server: $schema=.causa/configuration-schema.yaml

workspace:
  name: causa

project:
  name: workspace
  description: 'Provides the base functionalities for a workspace: configuration loading and registering functions.'
  language: typescript
  type: package

causa:
  modules:
    '@causa/workspace-core': ^1.0.0
    '@causa/workspace-typescript': ^1.0.0

model:
  schema: jsonschema

  codeGenerators:
    - generator: typescriptModelClass
      globs: [./src/context/schemas/*.yaml]
      output: src/context/generated.ts

javascript:
  dependencies:
    check:
      allowlist: [GHSA-h67p-54hq-rp68]
    update:
      packageTargets:
        '@types/node': minor
